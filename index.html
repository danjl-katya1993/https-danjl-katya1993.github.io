<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Супермаркет Симулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="ui-panel">
            <div class="stats">
                <div>Деньги: <span id="money">1000</span> руб.</div>
                <div>Уровень: <span id="level">1</span></div>
                <div>Репутация: <span id="reputation">50</span></div>
            </div>
            <div class="actions">
                <button id="hire-cashier">Нанять кассира (200 руб.)</button>
                <button id="hire-stock">Нанять складчика (150 руб.)</button>
                <button id="expand">Расширить магазин (500 руб.)</button>
            </div>
        </div>

        <div class="store">
            <div class="shelves" id="shelves">
                <!-- Полки будут создаваться через JS -->
            </div>
            <div class="customers" id="customers">
                <!-- Покупатели будут создаваться через JS -->
            </div>
            <div class="trash" id="trash">Мусорка</div>
        </div>

        <div class="tablet" id="tablet">
            <h3>Планшет закупок</h3>
            <div class="products-list" id="products-list">
                <!-- Товары для закупки будут создаваться через JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
