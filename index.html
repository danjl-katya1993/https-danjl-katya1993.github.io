<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кликер лимонада</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Кликер лимонада!</h1>
        <div class="stats">
            <p>Стаканов лимонада: <span id="lemonadeCount">0</span></p>
            <p>Автокликер: <span id="autoclickerLevel">0</span> (<span id="autoclickerPower">1</span> стакан/сек)</p>
        </div>
        <div class="game">
            <div id="lemon" class="lemon">🍋</div>
            <div class="shop">
                <h2>Магазин улучшений</h2>
                <button id="buyAutoclicker">Купить автокликер (10 стаканов)</button>
                <p id="shopMessage"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
