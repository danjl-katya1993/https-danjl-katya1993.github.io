<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мой GitHub Сайт</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        h1 { color: #58a6ff; }
        .box { border: 2px dashed #30363d; padding: 30px; display: inline-block; border-radius: 10px; background: #161b22; }
        .btn { background-color: #238636; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        .btn:hover { background-color: #2ea043; }
        #counter { font-size: 32px; color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Сайт будущего топ-разработчика 💻</h1>
        <p>Я создаю этот проект на GitHub в 10 лет.</p>
        <p>До цели стать профи осталось 8 лет!</p>
        
        <p>Кликни по кнопке:</p>
        <div id="counter">0</div>
        <button class="btn" onclick="countUp()">Клик!</button>
    </div>

    <script>
        let clicks = 0;
        function countUp() {
            clicks = clicks + 1;
            document.getElementById("counter").innerText = clicks;
        }
    </script>
</body>
</html>
